[general]
compat-delete='delete-sequence'
default-shell='/usr/bin/fish'
display-n=0
display-tab-names=0
fullscreen-hide-tabbar=false
gtk-prefer-dark-theme=true
gtk-use-system-default-theme=true
hide-tabs-if-one-tab=false
history-size=1000
infinite-history=true
max-tab-name-length=100
mouse-display=true
new-tab-after=true
open-tab-cwd=true
prompt-on-close-tab=1
prompt-on-quit=true
quick-open-command-line='zed %(file_path)s:%(line_number)s'
quick-open-enable=true
quick-open-in-current-terminal=false
restore-tabs-notify=true
restore-tabs-startup=true
save-tabs-when-changed=true
scroll-keystroke=true
start-at-login=true
tab-ontop=true
use-default-font=true
use-popup=false
use-scrollbar=true
use-trayicon=false
window-halignment=0
window-height=50
window-losefocus=false
window-refocus=false
window-tabbar=true
window-valignment=1
window-width=100

[keybindings/local]
close-terminal='<Primary><Alt>x'
focus-terminal-down='<Primary><Alt>j'
focus-terminal-left='<Primary><Alt>h'
focus-terminal-right='<Primary><Alt>l'
focus-terminal-up='<Primary><Alt>k'
split-tab-horizontal='<Primary><Alt>minus'
split-tab-vertical='<Primary><Alt>period'

[style]
cursor-shape=0

[style/background]
transparency=100

[style/font]
allow-bold=true
bold-is-bright=true
palette='#66665C5C5454:#FBFB49493434:#8383A5A59898:#D7D799992121:#B1B162628686:#454585858888:#B8B8BBBB2626:#D6D65D5D0E0E:#A8A899998484:#FBFB49493434:#8E8EC0C07C7C:#FAFABDBD2F2F:#D3D386869B9B:#68689D9D6A6A:#989897971A1A:#FEFE80801919:#EBEBDBDBB2B2:#282828282828'
palette-name='Gruvbox Dark'
